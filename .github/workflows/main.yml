name: CI/CD & Versioning

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    # 1. Checkout Code
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Required for versioning history

    # 2. Setup Node.js
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    # 3. Backend Verification
    - name: 📦 Install Server Dependencies
      run: |
        cd server
        npm install

    # 4. Frontend Verification
    - name: 📦 Install Client Dependencies
      run: |
        cd client
        npm install

    - name: 🏗️ Build React Frontend
      run: |
        cd client
        npm run build
      env:
        CI: false

  versioning:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permission to create tags/releases

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # 5. Automated Versioning & Tagging
    - name: 🏷️ Bump Version and Push Tag
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: patch  # Default to 0.0.1 increment if no keyword found
        release_branches: main

    # 6. Create a GitHub Release (Optional)
    - name: 🚀 Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.tag_version.outputs.new_tag }}
        name: Release ${{ steps.tag_version.outputs.new_tag }}
        body: ${{ steps.tag_version.outputs.changelog }}
        token: ${{ secrets.GITHUB_TOKEN }}